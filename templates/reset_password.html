<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — YoppyChat</title>
    <meta name="description" content="Set a new password for your YoppyChat account.">
    <!-- Same fonts & base CSS as the rest of the app -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main-purged.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Full-page centering — reuses app variables */
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-primary, #0f1117);
            padding: 20px;
        }

        /* Card matches .login-popup-content exactly */
        .rp-card {
            background: var(--surface-light);
            padding: var(--spacing-2xl, 2rem);
            border-radius: var(--radius-xl, 16px);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: relative;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header — identical to the login popup header */
        .rp-header {
            margin-bottom: 6px;
        }

        .rp-welcome-text {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .rp-logo {
            height: 68px;
            width: auto;
            display: inline-block;
        }

        .rp-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 24px;
            margin-top: 4px;
            line-height: 1.5;
        }

        /* Input fields — same as email auth inputs in popup */
        .rp-field {
            text-align: left;
            margin-bottom: 12px;
        }

        .rp-field label {
            display: block;
            font-size: 0.83rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .rp-field input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--neutral-300, #d1d5db);
            border-radius: var(--radius-md, 8px);
            font-size: 0.95rem;
            background: var(--surface-light);
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
            font-family: inherit;
        }

        .rp-field input:focus {
            border-color: var(--accent-primary, #ff9a56);
        }

        .rp-field input::placeholder {
            color: var(--text-muted);
        }

        /* Submit button — same gradient as login popup */
        .rp-btn {
            width: 100%;
            margin-top: 12px;
            padding: 10px 14px;
            background: var(--accent-primary, #ff9a56);
            color: #fff;
            font-weight: 600;
            border: none;
            border-radius: var(--radius-md, 8px);
            font-size: 0.95rem;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            font-family: inherit;
        }

        .rp-btn:hover {
            opacity: 0.88;
        }

        .rp-btn:active {
            transform: scale(0.98);
        }

        .rp-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        /* Alert banners */
        .rp-alert {
            padding: 8px 12px;
            border-radius: var(--radius-md, 8px);
            font-size: 0.85rem;
            margin-bottom: 12px;
            text-align: left;
            line-height: 1.5;
            display: none;
        }

        .rp-alert-error {
            background: #fee2e2;
            color: #b91c1c;
        }

        .rp-alert-success {
            background: #d1fae5;
            color: #065f46;
        }

        /* Dark mode overrides for alerts */
        html[data-theme='dark'] .rp-alert-error {
            background: rgba(185, 28, 28, 0.2);
            color: #fca5a5;
        }

        html[data-theme='dark'] .rp-alert-success {
            background: rgba(6, 95, 70, 0.25);
            color: #6ee7b7;
        }

        /* Back link */
        .rp-back {
            display: inline-block;
            margin-top: 16px;
            font-size: 0.83rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .rp-back:hover {
            color: var(--accent-primary, #ff9a56);
        }

        /* Spinner */
        .rp-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--neutral-200, #e5e7eb);
            border-top-color: var(--accent-primary, #ff9a56);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 14px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .rp-loading-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* States */
        #rp-loading {
            display: block;
        }

        #rp-invalid {
            display: none;
        }

        #rp-form-section {
            display: none;
        }

        /* Error icon badge for invalid state */
        .rp-icon-error {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 6px 18px rgba(239, 68, 68, 0.3);
        }

        .rp-icon-error svg {
            width: 26px;
            height: 26px;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="rp-card" id="rp-card">

        <!-- ── LOADING STATE ── -->
        <div id="rp-loading">
            <div class="rp-spinner"></div>
            <p class="rp-loading-text">Verifying your reset link…</p>
        </div>

        <!-- ── INVALID / EXPIRED LINK STATE ── -->
        <div id="rp-invalid">
            <div class="rp-icon-error">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </div>
            <h2 style="font-size:1.4rem; font-weight:700; color:var(--text-primary); margin-bottom:8px;">Link Expired
            </h2>
            <p class="rp-subtitle">This password reset link is invalid or has already expired.<br>Reset links are valid
                for 1 hour.</p>
            <a href="/" class="rp-btn" style="display:inline-block; text-decoration:none;">Back to Home</a>
        </div>

        <!-- ── RESET FORM STATE ── -->
        <div id="rp-form-section">
            <!-- YoppyChat logo -->
            <div style="margin-bottom:16px; text-align:center;">
                <img src="{{ url_for('static', filename='images/logo/primiry_logo_dark.png') }}" alt="YoppyChat"
                    style="height:68px; width:auto; display:block; margin:0 auto;">
            </div>
            <p class="rp-subtitle">Choose a strong new password for your account</p>

            <div id="rp-error" class="rp-alert rp-alert-error"></div>
            <div id="rp-success" class="rp-alert rp-alert-success"></div>

            <form id="rp-form" onsubmit="handleResetSubmit(event)" novalidate>
                <div class="rp-field">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" placeholder="At least 6 characters"
                        autocomplete="new-password" required>
                </div>
                <div class="rp-field">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Repeat your new password"
                        autocomplete="new-password" required>
                </div>
                <button type="submit" class="rp-btn" id="rp-submit-btn">Update Password</button>
            </form>

            <a href="/" class="rp-back">← Back to Home</a>
        </div>

    </div>

    <script>
        const SUPABASE_URL = "{{ SUPABASE_URL or '' }}";
        const SUPABASE_ANON_KEY = "{{ SUPABASE_ANON_KEY or '' }}";

        let supabaseClient = null;

        function showState(id) {
            ['rp-loading', 'rp-invalid', 'rp-form-section'].forEach(s => {
                document.getElementById(s).style.display = (s === id) ? 'block' : 'none';
            });
        }

        async function init() {
            if (!SUPABASE_URL || !SUPABASE_ANON_KEY) { showState('rp-invalid'); return; }

            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const type = params.get('type');
            const accessToken = params.get('access_token');
            const refreshToken = params.get('refresh_token');

            if (type !== 'recovery' || !accessToken || !refreshToken) {
                showState('rp-invalid');
                return;
            }

            try {
                const { error } = await supabaseClient.auth.setSession({
                    access_token: accessToken,
                    refresh_token: refreshToken
                });
                if (error) { showState('rp-invalid'); return; }

                // Remove tokens from browser history
                if (window.history.replaceState) {
                    window.history.replaceState(null, '', window.location.pathname);
                }
                showState('rp-form-section');
            } catch (e) {
                console.error('Reset init error:', e);
                showState('rp-invalid');
            }
        }

        async function handleResetSubmit(event) {
            event.preventDefault();

            const newPw = document.getElementById('new-password').value;
            const confirmPw = document.getElementById('confirm-password').value;
            const errDiv = document.getElementById('rp-error');
            const okDiv = document.getElementById('rp-success');
            const btn = document.getElementById('rp-submit-btn');
            const form = document.getElementById('rp-form');

            errDiv.style.display = 'none'; errDiv.textContent = '';
            okDiv.style.display = 'none'; okDiv.textContent = '';

            if (!newPw || newPw.length < 6) {
                errDiv.textContent = 'Password must be at least 6 characters.';
                errDiv.style.display = 'block';
                return;
            }
            if (newPw !== confirmPw) {
                errDiv.textContent = 'Passwords do not match.';
                errDiv.style.display = 'block';
                return;
            }
            if (!supabaseClient) {
                errDiv.textContent = 'Auth service unavailable. Please request a new reset link.';
                errDiv.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Updating…';

            try {
                const { error } = await supabaseClient.auth.updateUser({ password: newPw });
                if (error) {
                    errDiv.textContent = error.message;
                    errDiv.style.display = 'block';
                } else {
                    okDiv.textContent = 'Password updated! Redirecting to home…';
                    okDiv.style.display = 'block';
                    form.style.display = 'none';
                    await supabaseClient.auth.signOut();
                    setTimeout(() => { window.location.href = '/'; }, 2500);
                }
            } catch (e) {
                console.error('Reset error:', e);
                errDiv.textContent = 'An unexpected error occurred. Please try again.';
                errDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Update Password';
            }
        }

        init();
    </script>
</body>

</html>
